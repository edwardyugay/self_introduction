<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Introduction with Chat GPT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #164e63, transparent 25%),
        linear-gradient(180deg, #020617 0%, #0f172a 45%, #020617 100%);
      color: white;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border-radius: 30px;
    }

    .photo {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .photo.fade {
      opacity: 0;
      transform: scale(0.98);
    }

    .btn {
      border: none;
      border-radius: 18px;
      padding: 14px 24px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #38bdf8;
      color: #020617;
    }

    .btn-primary:hover {
      background: #7dd3fc;
    }

    .btn-secondary {
      background: transparent;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-secondary:hover {
      border-color: #94a3b8;
    }

    .text-box {
      min-height: 760px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(2,6,23,0.45);
      padding: 32px 40px;
      position: relative;
    }

    .paragraph {
      margin: 0 0 24px 0;
      text-indent: 2rem;
      font-size: 17px;
      line-height: 2.1;
      color: #e2e8f0;
      white-space: normal;
    }

    .highlight {
      position: relative;
      display: inline;
      border-radius: 6px;
      padding: 2px 6px;
      background: linear-gradient(to right, rgba(45,212,191,0.3), rgba(34,211,238,0.3), rgba(56,189,248,0.3));
      box-shadow: inset 0 0 0 1px rgba(103,232,249,0.35);
    }

    .tooltip {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(26rem, calc(100vw - 3rem));
      background: rgba(2,6,23,0.96);
      border: 1px solid rgba(103,232,249,0.12);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      display: none;
      text-indent: 0;
      white-space: normal;
    }

    .tooltip.top {
      bottom: 115%;
    }

    .tooltip.bottom {
      top: 115%;
    }

    .highlight:hover .tooltip {
      display: block;
    }

    .muted {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .rose {
      color: #fecdd3;
      word-break: break-word;
    }

    .cyan {
      color: #a5f3fc;
      word-break: break-word;
    }

    .desc {
      color: #cbd5e1;
      line-height: 1.6;
      word-break: break-word;
    }

    .progress-wrap {
      height: 12px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #2dd4bf, #22d3ee, #38bdf8);
      transition: width 0.4s ease;
    }

    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr !important;
      }

      .text-box {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" style="margin-bottom: 32px; overflow: hidden;">
      <div class="hero-grid" style="display:grid; grid-template-columns:1.05fr 0.95fr; gap:24px;">
        <div style="padding:32px 40px;">
          <div style="margin-bottom:12px; display:inline-flex; align-items:center; gap:8px; border-radius:999px; border:1px solid rgba(56,189,248,0.3); background:rgba(56,189,248,0.1); padding:6px 12px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#7dd3fc;">
            Self Introduction with Chat GPT
          </div>

          <h1 style="margin:0 0 16px 0; font-size:clamp(32px,5vw,54px); line-height:1.1; font-weight:800;">
            Self Introduction with Chat GPT
          </h1>

          <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
            <button id="improveBtn" class="btn btn-primary">Improve</button>
            <button id="resetBtn" class="btn btn-secondary">Reset</button>
          </div>
        </div>

        <div style="padding:24px 32px;">
          <div style="border-radius:24px; border:1px solid rgba(255,255,255,0.1); background:rgba(2,6,23,0.5); padding:20px; box-shadow:0 25px 60px rgba(0,0,0,0.35);">
            <div style="margin-bottom:16px; display:flex; align-items:center; gap:12px;">
              <div style="border-radius:18px; background:rgba(56,189,248,0.15); padding:12px; color:#7dd3fc;">👤</div>
              <div>
                <div style="font-size:18px; font-weight:700;">Eduard Yugay</div>
                <div style="font-size:14px; color:#94a3b8;">Flight Operations Student</div>
              </div>
            </div>

            <div style="overflow:hidden; border-radius:22px; border:1px solid rgba(103,232,249,0.2); background:rgba(255,255,255,0.05);">
              <img id="profilePhoto" src="./before.jpg" alt="Portrait" class="photo" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="padding:24px;">
      <div style="margin-bottom:16px; display:flex; justify-content:space-between; gap:16px; align-items:center;">
        <div>
          <div style="margin-bottom:4px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#67e8f9;">
            Live Essay View
          </div>
          <h2 style="margin:0; font-size:clamp(24px,3vw,36px); font-weight:800;">
            Original → Improved
          </h2>
        </div>

        <div id="statusText" style="border-radius:18px; background:rgba(2,6,23,0.5); padding:10px 16px; font-size:14px; color:#cbd5e1;">
          Ready to improve
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div class="text-box">
        <div id="essayContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const originalText = `My name is Eduard Yugay, and I am a second-year student at Korea Aerospace University, studying Flight Operations.

I am pursuing a career in aviation because I am interested in working in high-responsibility and safety-critical environments.

During my studies, I am developing both technical knowledge and a disciplined mindset that are important for becoming a professional pilot.

My background in IT and Quality Assurance helps me think in a structured way and pay attention to details, which I believe is important in aviation.

I see flight operations as a system where people, technology, and procedures must work together effectively.

My academic experience so far has helped me build a strong foundation in aviation-related subjects.

I have studied aviation safety, basic aerospace concepts, mathematics, and physics. These subjects helped me understand how aviation systems work.

Currently, I am studying aviation meteorology, aircraft systems, and ATC communication. These subjects are important for understanding real flight operations and decision-making.

I am also improving my English skills to be able to communicate in an international aviation environment.

In addition, I have experience with Basic Aviation Training Device (BATD), where I practice flight scenarios and apply what I learn in class.

I am also studying Human Factors and Safety Management Systems, which help me understand how pilots make decisions and manage risks.

Outside of my studies, I participate in an international Christian community in Korea.

Through this community, I take part in group activities and meet people from different backgrounds.

I also had opportunities to communicate with aviation professionals, including employees of Korean Air.

These interactions helped me better understand the aviation industry and career paths.

In addition, this experience improves my communication skills, especially in a multicultural environment.

I am focused on continuous self-improvement and developing the discipline required in aviation.

I work on improving my knowledge, communication skills, and ability to stay calm under pressure.

As a second-year student, I understand that I am still at the early stage of my training, so I try to use my time effectively through studying, simulator practice, and self-development.

I aim to build strong habits that will help me in my future career.

My goal is to become a commercial pilot and build a stable and responsible career in aviation.

I plan to continue my training, gain flight experience, and improve both my technical and non-technical skills.

In the future, I would also like to use my background in IT and Quality Assurance to contribute to safer and more efficient aviation systems.

In conclusion, I am building my path in aviation step by step through my studies, training, and personal development.

I am motivated to continue learning and improving in order to become a responsible and reliable pilot.`;

    const finalImprovedText = `My name is Eduard Yugay, and I am a second-year Flight Operations student at Korea Aerospace University.

I am pursuing a career in aviation because I am drawn to environments where responsibility, discipline, and safety are essential.

During my studies, I am developing both technical knowledge and the disciplined mindset required for a professional pilot.

My background in IT and Quality Assurance has taught me to think in a structured way and pay close attention to detail, which is essential in aviation.

I see flight operations as a complex system in which people, technology, and procedures must work together effectively.

My academic experience has provided me with a solid foundation in aviation-related subjects.

In the early stage of my studies, I focused on aviation safety, basic aerospace concepts, mathematics, and physics, which helped me understand the fundamental principles of aviation systems.

Currently, I am focusing on aviation meteorology, aircraft systems, and ATC communication, which are directly related to real flight operations and pilot decision-making.

I am also improving my English skills to communicate effectively in an international aviation environment.

In addition, I have gained practical experience using a Basic Aviation Training Device (BATD), where I practice flight scenarios and apply theoretical knowledge in simulated situations.

I am also studying Human Factors and Safety Management Systems, which have strengthened my understanding of pilot decision-making and risk management.

Outside of my academic studies, I take part in an international Christian community in Korea, where I participate in group activities and interact with people from diverse cultural backgrounds.

This experience has helped me develop stronger communication and interpersonal skills in a multicultural environment.

I have also had opportunities to communicate with aviation professionals, including employees of Korean Air, which has broadened my understanding of the aviation industry, career development, and professional expectations.

I believe this experience is valuable in aviation, where effective communication and teamwork are directly related to safety and operational performance.

I am committed to continuous improvement and to developing the discipline required in aviation.

I consistently work on strengthening my technical knowledge, communication skills, and ability to remain calm under pressure.

As a second-year student, I understand that I am still in the early stage of my training, which is why I try to use my time productively through academic study, simulator practice, and steady self-development.

My goal is to build the habits, responsibility, and consistency that will support my future performance as a pilot.

My goal is to become a commercial pilot and build a career defined by responsibility, safety, and reliability.

I plan to continue my training, gain flight experience, and further develop both my technical and non-technical competencies.

In the long term, I would like to combine my aviation training with my background in IT and Quality Assurance to contribute to safer, more efficient, and more reliable aviation systems.

Overall, I am building my future in aviation through academic study, practical training, and continuous personal development.

With a structured mindset, a strong sense of responsibility, and a commitment to safety, I am working steadily toward becoming a reliable and professional pilot.`;

    const changes = [
      {
        from: 'a second-year student at Korea Aerospace University, studying Flight Operations',
        to: 'a second-year Flight Operations student at Korea Aerospace University',
        why: 'More concise and more natural in an academic self-introduction.'
      },
      {
        from: 'I am interested in working in high-responsibility and safety-critical environments',
        to: 'I am drawn to environments where responsibility, discipline, and safety are essential',
        why: 'Stronger and more professional phrasing.'
      },
      {
        from: 'a disciplined mindset that are important for becoming a professional pilot',
        to: 'the disciplined mindset required for a professional pilot',
        why: 'Fixes grammar and improves precision.'
      },
      {
        from: 'helps me think in a structured way and pay attention to details, which I believe is important in aviation',
        to: 'has taught me to think in a structured way and pay close attention to detail, which is essential in aviation',
        why: 'Better tense consistency, collocation, and formality.'
      },
      {
        from: 'My academic experience so far has helped me build a strong foundation in aviation-related subjects',
        to: 'My academic experience has provided me with a solid foundation in aviation-related subjects',
        why: 'More formal and academically appropriate.'
      },
      {
        from: 'These subjects are important for understanding real flight operations and decision-making',
        to: 'these subjects are directly related to real flight operations and pilot decision-making',
        why: 'More specific and directly tied to aviation performance.'
      },
      {
        from: 'I have experience with Basic Aviation Training Device (BATD)',
        to: 'I have gained practical experience using a Basic Aviation Training Device (BATD)',
        why: 'Emphasizes practical experience.'
      },
      {
        from: 'which help me understand how pilots make decisions and manage risks',
        to: 'which have strengthened my understanding of pilot decision-making and risk management',
        why: 'More formal and precise phrasing.'
      },
      {
        from: 'I participate in an international Christian community in Korea',
        to: 'I take part in an international Christian community in Korea',
        why: 'Smoother and more natural phrasing.'
      },
      {
        from: 'meet people from different backgrounds',
        to: 'interact with people from diverse cultural backgrounds',
        why: 'More professional and specific wording.'
      },
      {
        from: 'These interactions helped me better understand the aviation industry and career paths',
        to: 'which has broadened my understanding of the aviation industry, career development, and professional expectations',
        why: 'More mature and analytical phrasing.'
      },
      {
        from: 'I am focused on continuous self-improvement',
        to: 'I am committed to continuous improvement',
        why: 'Committed sounds stronger and more intentional.'
      },
      {
        from: 'I work on improving my knowledge, communication skills, and ability to stay calm under pressure',
        to: 'I consistently work on strengthening my technical knowledge, communication skills, and ability to remain calm under pressure',
        why: 'More precise and professional.'
      },
      {
        from: 'I am still at the early stage of my training, so I try to use my time effectively through studying, simulator practice, and self-development',
        to: 'I am still in the early stage of my training, which is why I try to use my time productively through academic study, simulator practice, and steady self-development',
        why: 'Better flow and more polished structure.'
      },
      {
        from: 'build a stable and responsible career in aviation',
        to: 'build a career defined by responsibility, safety, and reliability',
        why: 'More distinctive and aligned with aviation values.'
      },
      {
        from: 'improve both my technical and non-technical skills',
        to: 'further develop both my technical and non-technical competencies',
        why: 'Competencies is a stronger professional term.'
      },
      {
        from: 'In the future',
        to: 'In the long term',
        why: 'Sounds more strategic and professional.'
      },
      {
        from: 'In conclusion, I am building my path in aviation step by step through my studies, training, and personal development',
        to: 'Overall, I am building my future in aviation through academic study, practical training, and continuous personal development',
        why: 'More confident and cohesive closing.'
      },
      {
        from: 'I am motivated to continue learning and improving in order to become a responsible and reliable pilot',
        to: 'With a structured mindset, a strong sense of responsibility, and a commitment to safety, I am working steadily toward becoming a reliable and professional pilot',
        why: 'Creates a much stronger final impression.'
      }
    ];

    const beforePhoto = './before.jpg';
    const afterPhoto = './after.jpg';

    const essayContainer = document.getElementById('essayContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const improveBtn = document.getElementById('improveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const profilePhoto = document.getElementById('profilePhoto');

    let displayText = originalText;
    let currentStep = 0;
    let started = false;
    let finished = false;
    let highlights = [];
    let isAnimating = false;
    let currentInterval = null;
    let currentTimeout = null;

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function switchPhoto(after) {
      profilePhoto.classList.add('fade');
      setTimeout(() => {
        profilePhoto.src = after ? afterPhoto : beforePhoto;
        profilePhoto.classList.remove('fade');
      }, 300);
    }

    function updateProgress() {
      const progress = Math.round((currentStep / changes.length) * 100);
      progressBar.style.width = (started ? progress : 0) + '%';
      statusText.textContent = started
        ? (finished ? 'Improvement complete' : `Improving... ${progress}%`)
        : 'Ready to improve';
    }

    function recalcHighlights(text, appliedChanges) {
      const results = [];
      let searchFrom = 0;

      appliedChanges.forEach((item) => {
        const start = text.indexOf(item.to, searchFrom);
        if (start === -1) return;

        results.push({
          start,
          end: start + item.to.length,
          from: item.from,
          to: item.to,
          why: item.why
        });

        searchFrom = start + item.to.length;
      });

      return results;
    }

    function renderText(text, appliedChanges) {
      const paragraphs = text.split('\n\n');
      const recalculatedHighlights = recalcHighlights(text, appliedChanges);
      let globalOffset = 0;

      essayContainer.innerHTML = paragraphs.map((paragraph, pIndex) => {
        const paragraphStart = globalOffset;
        const paragraphEnd = paragraphStart + paragraph.length;

        const paragraphHighlights = recalculatedHighlights
          .filter((h) => h.start < paragraphEnd && h.end > paragraphStart)
          .map((h) => ({
            ...h,
            localStart: Math.max(0, h.start - paragraphStart),
            localEnd: Math.min(paragraph.length, h.end - paragraphStart)
          }))
          .sort((a, b) => a.localStart - b.localStart);

        let html = '';
        let cursor = 0;
        const openAbove = pIndex >= paragraphs.length - 2;

        paragraphHighlights.forEach((h) => {
          if (cursor < h.localStart) {
            html += escapeHtml(paragraph.slice(cursor, h.localStart));
          }

          const tooltipPos = openAbove ? 'top' : 'bottom';

          html += `
            <span class="highlight">
              ${escapeHtml(paragraph.slice(h.localStart, h.localEnd))}
              <span class="tooltip ${tooltipPos}">
                <div class="muted">Why this is better</div>
                <div style="margin-bottom:10px; border-radius:12px; background:rgba(255,255,255,0.05); padding:10px;">
                  <div class="muted">Original</div>
                  <div class="rose">${escapeHtml(h.from)}</div>
                </div>
                <div style="margin-bottom:10px; border-radius:12px; background:rgba(255,255,255,0.05); padding:10px;">
                  <div class="muted">Improved</div>
                  <div class="cyan">${escapeHtml(h.to)}</div>
                </div>
                <div class="desc">${escapeHtml(h.why)}</div>
              </span>
            </span>
          `;

          cursor = h.localEnd;
        });

        if (cursor < paragraph.length) {
          html += escapeHtml(paragraph.slice(cursor));
        }

        globalOffset += paragraph.length + 2;
        return `<p class="paragraph">${html}</p>`;
      }).join('');
    }

    function animateNextChange() {
      if (!started || finished) return;

      if (currentStep >= changes.length) {
        finished = true;
        displayText = finalImprovedText;
        highlights = [...changes];
        renderText(displayText, highlights);
        updateProgress();
        isAnimating = false;
        return;
      }

      const change = changes[currentStep];
      const start = displayText.indexOf(change.from);

      if (start === -1) {
        currentStep += 1;
        updateProgress();
        currentTimeout = setTimeout(animateNextChange, 180);
        return;
      }

      isAnimating = true;

      const prefix = displayText.slice(0, start);
      const suffix = displayText.slice(start + change.from.length);
      const totalSteps = Math.max(change.from.length, change.to.length);
      let step = 0;

      currentInterval = setInterval(() => {
        step += 1;

        const incoming = change.to.slice(0, step);
        const outgoing = change.from.slice(step);
        displayText = prefix + incoming + outgoing + suffix;

        renderText(displayText, highlights);

        if (step >= totalSteps) {
          clearInterval(currentInterval);
          currentInterval = null;

          displayText = prefix + change.to + suffix;
          highlights = [...highlights, change];

          currentStep += 1;
          renderText(displayText, highlights);
          updateProgress();

          currentTimeout = setTimeout(() => {
            animateNextChange();
          }, 220);
        }
      }, 40);
    }

    improveBtn.addEventListener('click', () => {
      if (currentInterval) clearInterval(currentInterval);
      if (currentTimeout) clearTimeout(currentTimeout);

      displayText = originalText;
      highlights = [];
      currentStep = 0;
      started = true;
      finished = false;
      isAnimating = false;

      switchPhoto(true);
      renderText(displayText, highlights);
      updateProgress();
      animateNextChange();
    });

    resetBtn.addEventListener('click', () => {
      if (currentInterval) clearInterval(currentInterval);
      if (currentTimeout) clearTimeout(currentTimeout);

      displayText = originalText;
      highlights = [];
      currentStep = 0;
      started = false;
      finished = false;
      isAnimating = false;

      switchPhoto(false);
      renderText(displayText, highlights);
      updateProgress();
    });

    renderText(displayText, highlights);
    updateProgress();
  </script>
</body>
</html>
